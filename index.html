<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Risque Guild Manager</title>

    <link
        rel="stylesheet"
        href="style.css?v=4"
    >
</head>

<body>

    <header>

        <div class="logo">
            RISQUE GUILD MANAGER
        </div>

        <nav>

    <button
        class="tab active"
        id="plannerTab"
        type="button"
    >
        Guild League Planner
    </button>

    <button
        class="tab"
        id="rosterTab"
        type="button"
    >
        Guild Roster
    </button>

    <button
        class="tab"
        id="subLeagueTab"
        type="button"
    >
        Sub League
    </button>

</nav>

    </header>


    <div id="plannerPage">

        <aside class="playerPool">

            <h2>Player Pool</h2>

            <div class="pool-header">

                <div class="pool-title">
                    Available Players
                </div>

                <div id="playerCount">
                    0 Players
                </div>

            </div>
<div class="pool-filters">

    <select id="classFilter">

        <option value="all">
            All Classes
        </option>

        <option value="knight">
            Knight
        </option>

        <option value="priest">
            Priest
        </option>

        <option value="hunter">
            Hunter
        </option>

        <option value="wizard">
            Wizard
        </option>

        <option value="blacksmith">
            Blacksmith
        </option>

        <option value="gs">
            GS
        </option>

        <option value="druid">
            Druid
        </option>

        <option value="assassin">
            Assassin
        </option>

    </select>

</div>
            <div id="playerPool"></div>

        </aside>


        <main class="planner">
<div class="planner-actions">

    <button
        id="clearPlannerButton"
        class="planner-button clear-button"
        type="button"
    >
        Clear Planner
    </button>

    <button
        id="exportPlannerButton"
        class="planner-button export-button"
        type="button"
    >
        Export Raid Setup
    </button>

</div>
            <div id="raidOne"></div>

            <div class="bottomRaids">

                <div id="raidTwo"></div>

                <div id="raidThree"></div>

                <div id="roaming"></div>

            </div>

        </main>

    </div>


    <div
        id="rosterPage"
        style="display:none;"
    >

        <h2>Guild Roster</h2>

        <div id="rosterTable"></div>

    </div>
<div
    id="subLeaguePage"
    style="display:none;"
>

    <h2>Sub League</h2>

    <div class="sub-league-header">

        <p>
            Non-Elite Guild Members
        </p>

        <div id="subLeagueCount">
            0 Players
        </div>

    </div>

    <div id="subLeagueTable"></div>

</div>

    <!-- SortableJS loads only once -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- Project scripts -->
    <script src="js/planner.js?v=16"></script>
    <script src="js/roster.js?v=4"></script>
    <script src="js/tabs.js?v=4"></script>
    <script src="js/app.js?v=10"></script>
    <script src="js/google.js?v=4"></script>

</body>

</html>
